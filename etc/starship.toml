"$schema" = 'https://starship.rs/config-schema.json'

add_newline = false

format = """
$os[¯é░](bg:dark fg:black)\
$directory[¯é░](bg:medium fg:dark)\
$git_branch$git_status[¯é░](fg:medium)\
( ($shell )$all)\
$fill\
([¯é▓](fg:danger)$status[¯é░](fg:danger))\
[¯é▓](fg:light)\
($cmd_duration[¯é│](bg:light fg:txt))\
([ ](bg:light)$username$hostname)\
[¯é▓](bg:light fg:dark)$time\
$line_break\
$character"""

palette = "plum"

[palettes.plum]
gray = "#808080"
txt = "#eaeaea"
dark = "#af5fff"
medium = "#af87ff"
light = "#d787ff"
danger = "#ff4242"

[cmd_duration]
style = "bg:light fg:txt"
format = "[( $duration ´ëÆ )]($style)"
show_milliseconds = true

[directory]
disabled = false
format = "[ ´ü╝ $path $read_only]($style)"
style = "bold bg:dark fg:txt"
read_only = "¾░î¥ "
[directory.substitutions]
"Documents" = "¾░êÖ"
"Downloads" = "´ÇÖ"
"Music" = "´Çü"
"Pictures" = "´Ç¥"

[docker_context]
disabled = true
symbol = "´îê "
detect_files = ['docker-compose.yml', 'docker-compose.yaml', 'Dockerfile', 'compose.yml', 'compose.yaml', 'Containerfile']

[fill]
symbol = "ÔöÇ"
style = "gray"

[git_branch]
disabled = false
style = "bg:medium fg:txt"
format = "[ $symbol$branch(:$remote_branch) ]($style)"
symbol = "´Éİ "

[git_commit]
tag_disabled = false

[git_status]
disabled = false
style = "bg:medium fg:txt"
format = '([\[$all_status$ahead_behind\] ]($style))'

[hostname]
disabled = false
ssh_only = true
ssh_symbol = "¾░Æï "
format = '[$hostname ($ssh_symbol )]($style)'
